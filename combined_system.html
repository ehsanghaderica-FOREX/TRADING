const FIB_EMA = [8,13,21,34,55,89,144,233,377];
let tmr = null;

// ══ OANDA ══
function toOandaSym(sym){ return sym.replace('/','_').replace('WTI_USD','WTICO_USD'); }
function toOandaGran(tf){ return {'5min':'M5','15min':'M15','30min':'M30','1h':'H1','4h':'H4','1day':'D'}[tf]||'H1'; }

async function fetchOanda(sym, tf, count=500) {
  const targetUrl = `${OANDA_BASE}/instruments/${toOandaSym(sym)}/candles?count=${count}&granularity=${toOandaGran(tf)}&price=M`;
  
  // روش ۱: مستقیم (اگر از سرور باز شده)
  try {
    const res = await fetch(targetUrl, {
      headers:{'Authorization':'Bearer '+OANDA_TOKEN,'Accept-Datetime-Format':'RFC3339'}
    });
    if (res.ok) {
      const json = await res.json();
      const c = (json.candles||[]).filter(x=>x.complete);
      if (c.length) return {
        C:c.map(x=>parseFloat(x.mid.c)), H:c.map(x=>parseFloat(x.mid.h)),
        L:c.map(x=>parseFloat(x.mid.l)), V:c.map(x=>x.volume||1),
        last:parseFloat(c[c.length-1].mid.c), src:'OANDA'
      };
    }
  } catch(e) {}

  // روش ۲: از طریق corsproxy.io
  try {
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);
    const res = await fetch(proxyUrl, {
      headers:{'Authorization':'Bearer '+OANDA_TOKEN,'Accept-Datetime-Format':'RFC3339',
               'x-cors-api-key':'temp_demo'}
    });
    if (res.ok) {
      const json = await res.json();
      const c = (json.candles||[]).filter(x=>x.complete);
      if (c.length) return {

        last:parseFloat(c[c.length-1].mid.c), src:'OANDA'

    }
  } catch(e) {}

  // روش ۳: allorigins
  try {
    const proxyUrl2 = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(targetUrl);
    const res = await fetch(proxyUrl2);
    if (res.ok) {

      const c = (json.candles||[]).filter(x=>x.complete);
      if (c.length) return {

async function fetchTD(sym, tf) {
  const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${sym}&interval=${tf}&outputsize=500&apikey=${KEY}`);
  const json = await res.json();
  if (json.status==='error'||!json.values) throw new Error(json.message||'خطا');
  const vals = json.values.reverse();
  return {
    C:vals.map(v=>parseFloat(v.close)), H:vals.map(v=>parseFloat(v.high)),
    L:vals.map(v=>parseFloat(v.low)), V:null,
    last:parseFloat(vals[vals.length-1].close), src:'TwelveData'
  };
}

async function fetchData(sym, tf) {
  try { return await fetchOanda(sym, tf); } catch(e) {}
  return await fetchTD(sym, tf);
}

// ══ محاسبات پایه ══
function calcEMA(data, p) {
  if (data.length < p) return null;
  const k = 2/(p+1);
  let e = data.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for (let i=p; i<data.length; i++) e = data[i]*k + e*(1-k);
  return e;
}

function calcATR(H, L, C, p=14) {
  const tr = [H[0]-L[0]];
  for (let i=1; i<C.length; i++)
    tr.push(Math.max(H[i]-L[i],Math.abs(H[i]-C[i-1]),Math.abs(L[i]-C[i-1])));
  let a = tr.slice(0,p).reduce((x,y)=>x+y,0)/p;
  for (let i=p; i<tr.length; i++) a=(a*(p-1)+tr[i])/p;
  return a;
}

// ══ سیستم ۱: نیوتن ══
function newtonAnalysis(C, H, L, V, atr, k) {
  const n = C.length-1;
  if (n < 25) return null;

  // حرکت: M = P(t) - P(t-20)
  const M = C[n] - C[n-20];
  const Mnorm = M / atr;

  // شتاب: A = M(t) - M(t-1)
  const M1 = C[n-1] - C[n-21];
  const A = M - M1;
  const Anorm = A / atr;

  // نیرو: F = حجم × شتاب
  let F;
  if (V) {
    const recentV = V.slice(-5).reduce((a,b)=>a+b,0)/5;
    const avgV = V.reduce((a,b)=>a+b,0)/V.length||1;
    F = (recentV/avgV) * Anorm;
  } else {
    const ranges = [];
    for (let i=n-4; i<=n; i++) ranges.push(H[i]-L[i]);
    F = (ranges.reduce((a,b)=>a+b,0)/5/atr) * Anorm;
  }

  const threshold = k;
  let score = 0;
  const signals = [];

  if (Math.abs(Mnorm) > threshold) {
    score += Mnorm > 0 ? 1 : -1;
    signals.push(Mnorm > 0 ? 'حرکت صعودی' : 'حرکت نزولی');
  }
  if (Math.abs(Anorm) > threshold*0.1) {
    if (Math.sign(A)===Math.sign(M)) { score += A>0?0.5:-0.5; signals.push('شتاب تایید'); }
    else signals.push('⚠️ شتاب معکوس');
  }
  if (Math.abs(F) > 0) { score += F>0?0.5:-0.5; signals.push(F>0?'نیرو صعودی':'نیرو نزولی'); }

  return { score, Mnorm, Anorm, F, signals, threshold };
}

// ══ سیستم ۲: گرانش EMA ══
function gravityAnalysis(C, H, L, atr) {
  const price = C[C.length-1];
  const prevPrice = C[C.length-2];
  let totalGravity = 0, count = 0;
  const broken = [], targets = [];

  FIB_EMA.forEach(p => {
    if (C.length < p) return;
    const emaVal = calcEMA(C, p);
    if (!emaVal) return;
    const dist = emaVal - price;
    const distNorm = dist / atr;
    const r = Math.abs(distNorm) || 0.001;
    const mass = Math.log(p+1);
    const gravity = (mass/(r*r)) * Math.sign(dist);
    totalGravity += gravity;
    count++;

    // شکست EMA
    const prevEMA = calcEMA(C.slice(0,-1), p);
    if (prevEMA) {
      if (prevPrice < prevEMA && price > emaVal) broken.push({p, dir:'up', val:emaVal});
      else if (prevPrice > prevEMA && price < emaVal) broken.push({p, dir:'dn', val:emaVal});
    }

    // هدف بعدی
    targets.push({p, dist, distNorm, val:emaVal});
  });

  const normG = count > 0 ? totalGravity/count : 0;
  // normG منفی = EMAها بالای قیمت = جذب به بالا
  // normG مثبت = EMAها زیر قیمت = جذب به پایین

  const aboveCount = FIB_EMA.filter(p => {
    const e = calcEMA(C, p); return e && e > price;
  }).length;

  // هدف‌های جذب
  const upTargets = targets.filter(t=>t.dist>0).sort((a,b)=>a.dist-b.dist);
  const dnTargets = targets.filter(t=>t.dist<0).sort((a,b)=>b.dist-a.dist);

  let gravScore = 0;
  if (normG < -0.3) gravScore = 1;    // جذب به بالا
  else if (normG > 0.3) gravScore = -1; // جذب به پایین

  return { normG, gravScore, broken, aboveCount, upTargets, dnTargets, price };
}

// ══ ترکیب و تحلیل نهایی ══
function combineAndNarrate(newton, gravity, sym, atr, src) {
  const d = sym.includes('JPY')||sym.includes('XAU')||sym.includes('WTI')||sym.includes('BTC') ? 2 : 5;
  const price = gravity.price.toFixed(d);

  // امتیاز ترکیبی
  const combinedScore = (newton.score * 0.5) + (gravity.gravScore * 0.5);

  // تایید دوگانه
  const bothAgree = Math.sign(newton.score) === Math.sign(gravity.gravScore) && Math.abs(newton.score) >= 0.5;
  const strongSignal = Math.abs(combinedScore) >= 0.75 && bothAgree;
  const weakSignal = Math.abs(combinedScore) >= 0.4 && !bothAgree;

  // هدف
  const isUp = combinedScore > 0;
  const nextTarget = isUp ? gravity.upTargets[0] : gravity.dnTargets[0];
  const nextTarget2 = isUp ? gravity.upTargets[1] : gravity.dnTargets[1];

  // شتاب معکوس
  const reverseWarning = newton.signals.includes('⚠️ شتاب معکوس');

  // ── متن تشریحی ──
  let title, titleColor, titleBg, text;

  if (strongSignal && isUp) {
    title = '▲ فرصت خرید';
    titleColor = '#3fb950'; titleBg = '#0a1f12';
    text = `قیمت ${sym} در حال حاضر ${price} است و هر دو سیستم صعود را تایید می‌کنند.\n\n`;
    text += `سیستم نیوتن: ${newton.signals.filter(s=>!s.includes('⚠️')).join('، ')} — نیروی صعودی ${Math.abs(newton.Mnorm).toFixed(1)}× آستانه.\n\n`;
    text += `سیستم گرانش: ${gravity.aboveCount} میانگین بالای قیمت هستند و قیمت را به سمت بالا می‌کشند.`;
    if (gravity.broken.filter(b=>b.dir==='up').length > 0)
      text += ` EMA${gravity.broken.filter(b=>b.dir==='up').map(b=>b.p).join('، ')} شکسته شده — شتاب تایید.`;
    if (nextTarget)
      text += `\n\nهدف اول: EMA${nextTarget.p} در ${nextTarget.val.toFixed(d)} (فاصله ${Math.abs(nextTarget.distNorm).toFixed(1)}× ATR).`;
    if (nextTarget2)
      text += ` هدف دوم: EMA${nextTarget2.p} در ${nextTarget2.val.toFixed(d)}.`;
    if (reverseWarning)
      text += `\n\n⚠️ هشدار: شتاب در حال معکوس شدن است — با احتیاط وارد شوید.`;
    else
      text += `\n\nاین حرکت ادامه دارد مگر اینکه قیمت به EMA${nextTarget?.p||'بزرگ'} برسد و دفع شود.`;

  } else if (strongSignal && !isUp) {
    title = '▼ فرصت فروش';
    titleColor = '#f85149'; titleBg = '#1f0a0a';
    text = `قیمت ${sym} در حال حاضر ${price} است و هر دو سیستم نزول را تایید می‌کنند.\n\n`;
    text += `سیستم نیوتن: ${newton.signals.filter(s=>!s.includes('⚠️')).join('، ')} — نیروی نزولی ${Math.abs(newton.Mnorm).toFixed(1)}× آستانه.\n\n`;
    text += `سیستم گرانش: ${FIB_EMA.length - gravity.aboveCount} میانگین زیر قیمت هستند و قیمت را به سمت پایین می‌کشند.`;
    if (gravity.broken.filter(b=>b.dir==='dn').length > 0)
      text += ` EMA${gravity.broken.filter(b=>b.dir==='dn').map(b=>b.p).join('، ')} شکسته شده — شتاب تایید.`;
    if (nextTarget)
      text += `\n\nهدف اول: EMA${nextTarget.p} در ${nextTarget.val.toFixed(d)} (فاصله ${Math.abs(nextTarget.distNorm).toFixed(1)}× ATR).`;
    if (nextTarget2)
      text += ` هدف دوم: EMA${nextTarget2.p} در ${nextTarget2.val.toFixed(d)}.`;
    if (reverseWarning)
      text += `\n\n⚠️ هشدار: شتاب در حال معکوس شدن است — با احتیاط وارد شوید.`;
    else
      text += `\n\nاین حرکت ادامه دارد مگر اینکه قیمت به EMA${nextTarget?.p||'بزرگ'} برسد و دفع شود.`;

  } else if (weakSignal && isUp) {
    title = '↑ احتمال صعود — تایید ناقص';
    titleColor = '#d29922'; titleBg = '#1c1a0a';
    text = `قیمت ${sym} در حال حاضر ${price} است.\n\n`;
    text += `یک سیستم صعود را نشان می‌دهد ولی دیگری هنوز تایید نکرده. `;
    text += `سیستم نیوتن امتیاز ${newton.score.toFixed(1)} و سیستم گرانش امتیاز ${gravity.gravScore.toFixed(1)} دارد.\n\n`;
    text += `توصیه: منتظر تایید هر دو سیستم باشید — هنوز وارد معامله نشوید.`;

  } else if (weakSignal && !isUp) {
    title = '↓ احتمال نزول — تایید ناقص';
    titleColor = '#d29922'; titleBg = '#1c1a0a';
    text = `قیمت ${sym} در حال حاضر ${price} است.\n\n`;
    text += `یک سیستم نزول را نشان می‌دهد ولی دیگری هنوز تایید نکرده. `;
    text += `سیستم نیوتن امتیاز ${newton.score.toFixed(1)} و سیستم گرانش امتیاز ${gravity.gravScore.toFixed(1)} دارد.\n\n`;
    text += `توصیه: منتظر تایید هر دو سیستم باشید — هنوز وارد معامله نشوید.`;

  } else {
    title = '— بازار خنثی';
    titleColor = '#8b949e'; titleBg = '#161b22';
    text = `قیمت ${sym} در حال حاضر ${price} است.\n\n`;
    text += `هیچ نیروی مشخصی در بازار وجود ندارد. `;
    text += `${gravity.aboveCount} میانگین بالا و ${FIB_EMA.length - gravity.aboveCount} میانگین زیر قیمت هستند — نیروها تقریباً متعادل‌اند.\n\n`;
    text += `توصیه: صبر کنید. وقتی قیمت یک EMA کلیدی را با حجم بشکند، سیگنال ظاهر می‌شود.`;
  }

  // ── جدول مقایسه دو سیستم ──
  const n1Color = newton.score > 0 ? '#3fb950' : newton.score < 0 ? '#f85149' : '#8b949e';
  const g1Color = gravity.gravScore > 0 ? '#3fb950' : gravity.gravScore < 0 ? '#f85149' : '#8b949e';
  const n1Label = newton.score >= 1 ? 'صعودی قوی' : newton.score > 0 ? 'صعودی ضعیف' : newton.score <= -1 ? 'نزولی قوی' : newton.score < 0 ? 'نزولی ضعیف' : 'خنثی';
  const g1Label = gravity.gravScore > 0 ? 'جذب صعودی' : gravity.gravScore < 0 ? 'جذب نزولی' : 'متعادل';

  return {
    title, titleColor, titleBg, text,
    combinedScore, newton, gravity,
    n1Color, g1Color, n1Label, g1Label,
    src, d, sym, price
  };
}

// ══ رندر UI ══
function renderUI(result) {
  const r = result;
  const confBadge = Math.abs(r.combinedScore) >= 0.75
    ? '<span style="font-size:11px;padding:2px 8px;border-radius:5px;background:'+r.titleColor+'33;color:'+r.titleColor+';border:1px solid '+r.titleColor+'">تایید دوگانه ✓</span>'
    : '<span style="font-size:11px;padding:2px 8px;border-radius:5px;background:#1c1a0a;color:#d29922;border:1px solid #9e6a03">تایید ناقص</span>';

  const srcBadge = r.src === 'OANDA'

// ══ اخبار فارکس ══
async function loadNews() {
  const newsEl = document.getElementById('news-list');
  if (!newsEl) return;
  newsEl.innerHTML = '<div class="news-empty">در حال بارگذاری...</div>';

  try {
    // Forex Factory XML feed از طریق پروکسی
    const ffUrl = 'https://nfs.faireconomy.media/ff_calendar_thisweek.json';
    const proxyUrl = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(ffUrl);
    
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('خطا');
    const data = await res.json();
    
    // فیلتر: فقط USD, EUR, GBP با تاثیر بالا و متوسط
    const filtered = data.filter(e => {
      const cur = e.currency?.toUpperCase();
      const imp = e.impact?.toLowerCase();
      return ['USD','EUR','GBP'].includes(cur) && ['high','medium'].includes(imp);
    }).slice(0, 15);

    if (!filtered.length) {
      newsEl.innerHTML = '<div class="news-empty">اخبار مهمی این هفته یافت نشد</div>';
      return;
    }

    // مرتب بر اساس زمان
    filtered.sort((a,b) => new Date(a.date) - new Date(b.date));

    let html = '';
    const now = new Date();

    filtered.forEach(e => {
      const date = new Date(e.date);
      const isPast = date < now;
      const isToday = date.toDateString() === now.toDateString();
      const isSoon = !isPast && (date - now) < 3600000; // کمتر از یک ساعت

      const timeStr = date.toLocaleDateString('fa-IR', {weekday:'short', month:'short', day:'numeric'}) 
                    + ' ' + date.toLocaleTimeString('fa-IR', {hour:'2-digit', minute:'2-digit'});
      
      const cur = e.currency?.toUpperCase();
      const curClass = cur==='USD'?'cur-usd':cur==='EUR'?'cur-eur':'cur-gbp';
      const imp = e.impact?.toLowerCase();
      const impClass = imp==='high'?'imp-high':imp==='medium'?'imp-med':'imp-low';
      const impLabel = imp==='high'?'🔴':imp==='medium'?'🟡':'🟢';
      
      const title = e.title || e.event || '—';
      const prev = e.previous ? 'قبلی: '+e.previous : '';
      const forecast = e.forecast ? ' | پیش‌بینی: '+e.forecast : '';
      
      const rowBg = isSoon ? 'background:#1c1a0a;' : isPast ? 'opacity:0.6;' : '';

      html += `<div class="news-item" style="${rowBg}">
        <div class="news-time">${timeStr.split(' ').slice(-1)[0]}<br><span style="font-size:9px">${timeStr.split(' ').slice(0,-1).join(' ')}</span></div>
        <div>
          <div class="news-title">${impLabel} ${title}${isSoon?' <span style="color:#f0b429;font-size:10px">← زود!</span>':''}</div>
          ${prev||forecast?`<div class="news-prev">${prev}${forecast}</div>`:''}
        </div>
        <span class="news-cur ${curClass}">${cur}</span>
      </div>`;
    });

    newsEl.innerHTML = html;
  } catch(e) {
    // fallback: نمایش اخبار ثابت هفتگی مهم
    newsEl.innerHTML = `<div class="news-empty">
      اخبار آنلاین در دسترس نیست.<br>
      <a href="https://www.forexfactory.com/calendar" target="_blank" 
         style="color:#58a6ff;font-size:11px">مشاهده در Forex Factory ↗</a>
    </div>`;
  }
}

async function analyze() {
  const sym = document.getElementById('sym').value;
  const tf = document.getElementById('tf').value;
  const k = parseFloat(document.getElementById('kSlider').value);
  const btn = document.getElementById('btn');
  btn.textContent = 'در حال تحلیل...'; btn.disabled = true;
  document.getElementById('content').innerHTML = '<div class="prog">در حال دریافت داده از ' + sym + '...</div>';

  try {
    const data = await fetchData(sym, tf);
    const {C, H, L, V, src} = data;
    const atr = calcATR(H, L, C);

    const newton = newtonAnalysis(C, H, L, V, atr, k);
    if (!newton) throw new Error('داده کافی نیست');

    const gravity = gravityAnalysis(C, H, L, atr);
    const result = combineAndNarrate(newton, gravity, sym, atr, src);

    renderUI(result);
    document.getElementById('ut').textContent = sym + ' ' + tf + ' — ' + new Date().toLocaleTimeString('fa-IR');

  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">خطا: ' + e.message + '</div>';
  }

  btn.textContent = 'تحلیل کن'; btn.disabled = false;
  if (tmr) clearTimeout(tmr);
  tmr = setTimeout(analyze, 5*60*1000);
}
