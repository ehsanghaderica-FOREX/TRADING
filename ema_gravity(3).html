<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EMA Gravity System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Tahoma,Arial,sans-serif;background:#0d1117;color:#e6edf3;direction:rtl}
.hdr{background:#161b22;padding:10px 16px;border-bottom:1px solid #30363d;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:14px;font-weight:bold;color:#58a6ff}
.hdr-sub{font-size:10px;color:#8b949e;margin-top:2px}
.live{display:flex;align-items:center;gap:5px;font-size:11px;color:#3fb950}
.dot{width:7px;height:7px;border-radius:50%;background:#3fb950;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.ctrl{background:#161b22;padding:8px 12px;border-bottom:1px solid #30363d;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
select{padding:6px 8px;border:1px solid #30363d;border-radius:7px;font-size:12px;font-family:Tahoma,Arial,sans-serif;background:#0d1117;color:#e6edf3}
.btn{padding:7px 16px;background:#238636;color:#fff;border:none;border-radius:7px;font-size:12px;cursor:pointer;font-weight:bold;font-family:Tahoma,Arial,sans-serif}
.btn:disabled{opacity:.5}
.auto-badge{font-size:10px;color:#3fb950;border:1px solid #238636;padding:2px 8px;border-radius:5px}

/* Main signal */
.main-sig{margin:8px;padding:12px 14px;border-radius:10px;border:2px solid #30363d}
.ms-buy{background:#0a1f12;border-color:#238636}
.ms-sell{background:#1f0a0a;border-color:#da3633}
.ms-neu{background:#161b22;border-color:#30363d}
.ms-title{font-size:16px;font-weight:bold;margin-bottom:5px}
.ms-body{font-size:12px;color:#8b949e;line-height:1.7}
.ms-target{font-size:12px;margin-top:6px;font-weight:bold}

/* Gravity meter */
.gravity-box{margin:0 8px 8px;background:#161b22;border-radius:10px;border:1px solid #30363d;overflow:hidden}
.gravity-hdr{padding:8px 12px;font-size:12px;font-weight:bold;color:#f0b429;border-bottom:1px solid #30363d;display:flex;justify-content:space-between}
.gravity-body{padding:10px 12px}
.gravity-total{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.gt-label{font-size:11px;color:#8b949e;min-width:80px}
.gt-bar-bg{flex:1;height:14px;background:#21262d;border-radius:7px;overflow:hidden;position:relative}
.gt-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:#30363d}
.gt-bar-fill{height:100%;border-radius:7px;transition:width .5s,margin .5s}
.gt-val{font-size:13px;font-weight:bold;min-width:50px;text-align:left}

/* EMA list */
.ema-list{display:flex;flex-direction:column;gap:5px}
.ema-row{display:flex;align-items:center;gap:8px}
.ema-label{font-size:10px;min-width:54px;text-align:right}
.ema-bar-bg{flex:1;height:8px;background:#21262d;border-radius:4px;overflow:hidden;position:relative}
.ema-center{position:absolute;left:50%;top:0;width:1px;height:100%;background:#30363d}
.ema-bar-fill{height:100%;border-radius:4px;transition:all .4s}
.ema-dist{font-size:10px;min-width:44px;text-align:left}
.ema-price{font-size:10px;color:#8b949e;min-width:70px;text-align:left}

/* State cards */
.state-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:0 8px 8px}
.state-card{background:#161b22;border-radius:9px;border:1px solid #30363d;padding:9px 11px}
.sc-title{font-size:11px;color:#8b949e;margin-bottom:4px}
.sc-val{font-size:14px;font-weight:bold}
.sc-sub{font-size:10px;color:#8b949e;margin-top:2px}

/* Narrative */
.narr{margin:0 8px 8px;padding:12px 14px;background:#161b22;border-radius:10px;border:1px solid #30363d;font-size:12px;line-height:1.9;color:#e6edf3}

/* Broken EMAs */
.broken-box{margin:0 8px 8px;background:#161b22;border-radius:10px;border:1px solid #30363d;overflow:hidden}
.broken-hdr{padding:7px 12px;font-size:12px;font-weight:bold;color:#bc8cff;border-bottom:1px solid #30363d}
.broken-list{padding:8px 12px;display:flex;flex-direction:column;gap:5px}
.broken-item{display:flex;align-items:center;justify-content:space-between;font-size:11px;padding:5px 8px;border-radius:6px}
.bi-up{background:#0a1f12;color:#3fb950}
.bi-dn{background:#1f0a0a;color:#f85149}
.bi-label{font-weight:bold}
.bi-detail{color:#8b949e;font-size:10px}

.up{color:#3fb950}.dn{color:#f85149}.nu{color:#8b949e}
.status{text-align:center;padding:40px;color:#8b949e;font-size:13px}
.error{margin:8px;padding:10px;background:#2d0f0f;border:1px solid #da3633;border-radius:8px;color:#f85149;text-align:center;font-size:12px}
</style>
</head>
<body>

<div class="hdr">
  <div>
    <h1>🌌 EMA Gravity System</h1>
    <div class="hdr-sub">جذب و دفع میانگین‌های فیبوناچی — F = G × m / r²</div>
  </div>
  <div class="live"><div class="dot"></div><span id="ut">آماده</span></div>
</div>

<div class="ctrl">
  <select id="sym">
    <optgroup label="فارکس اصلی">
      <option value="EUR/USD">EUR/USD</option><option value="GBP/USD">GBP/USD</option>
      <option value="USD/JPY">USD/JPY</option><option value="AUD/USD">AUD/USD</option>
      <option value="USD/CAD">USD/CAD</option><option value="USD/CHF">USD/CHF</option>
      <option value="NZD/USD">NZD/USD</option>
    </optgroup>
    <optgroup label="کراس">
      <option value="EUR/GBP">EUR/GBP</option><option value="GBP/JPY">GBP/JPY</option>
      <option value="AUD/JPY">AUD/JPY</option><option value="EUR/JPY">EUR/JPY</option>
    </optgroup>
    <optgroup label="کالا">
      <option value="XAU/USD">XAU/USD — طلا</option><option value="WTI/USD">WTI/USD — نفت</option>
    </optgroup>
    <optgroup label="کریپتو">
      <option value="BTC/USD">BTC/USD</option><option value="ETH/USD">ETH/USD</option>
    </optgroup>
  </select>
  <select id="tf">
    <option value="5min">۵ دقیقه</option><option value="15min" selected>۱۵ دقیقه</option>
    <option value="30min">۳۰ دقیقه</option><option value="45min">۴۵ دقیقه</option>
    <option value="1h">۱ ساعته</option><option value="2h">۲ ساعته</option>
    <option value="4h">۴ ساعته</option><option value="1day">روزانه</option>
  </select>
  <button class="btn" id="btn" onclick="loadData()">تحلیل کن</button>
  <button onclick="loadData()" style="padding:5px 12px;background:#0d1117;color:#8b949e;border:1px solid #30363d;border-radius:6px;font-size:11px;cursor:pointer;font-family:Tahoma">🔄 بروزرسانی دستی</button>
</div>

<div id="content"><div class="status">جفت ارز و تایم‌فریم انتخاب کنید</div></div>

<script>
const KEY = 'dea3a67f4fc1411585d1b7e8a09c8166';
const OANDA_TOKEN = '627658dd4584bf4a9f2496bf0c0e7454-b250f32abc434fdbdfe52e6b2a3f98f6';
const OANDA_URL = 'https://api-fxpractice.oanda.com/v3';

// تبدیل نماد به فرمت OANDA
function toOandaSym(sym) {
  return sym.replace('/', '_').replace('XAU', 'XAU').replace('WTI', 'WTICO');
}

// تبدیل تایم‌فریم به گرانولاریتی OANDA
function toOandaGran(tf) {
  const map = {'5min':'M5','15min':'M15','30min':'M30','45min':'M30','1h':'H1','2h':'H2','4h':'H4','1day':'D'};
  return map[tf] || 'H1';
}

async function fetchOandaCandles(sym, tf, count=500) {
  const instrument = toOandaSym(sym);
  const gran = toOandaGran(tf);
  const url = `${OANDA_URL}/instruments/${instrument}/candles?count=${count}&granularity=${gran}&price=M`;
  const res = await fetch(url, {
    headers: {
      'Authorization': 'Bearer ' + OANDA_TOKEN,
      'Accept-Datetime-Format': 'RFC3339',
      'Content-Type': 'application/json'
    }
  });
  if (!res.ok) throw new Error('OANDA: ' + res.status);
  const json = await res.json();
  if (!json.candles) throw new Error('OANDA: داده خالی');
  const candles = json.candles.filter(c => c.complete);
  return {
    C: candles.map(c => parseFloat(c.mid.c)),
    H: candles.map(c => parseFloat(c.mid.h)),
    L: candles.map(c => parseFloat(c.mid.l)),
    V: candles.map(c => c.volume || 1), // حجم واقعی OANDA
    last: parseFloat(candles[candles.length-1].mid.c)
  };
}
const FIB = [8,13,21,34,55,89,144,233,377];
const FIB_COLORS = ['#58a6ff','#4dabf7','#3fb950','#69db7c','#d29922','#f0b429','#f85149','#e03131','#bc8cff'];

function calcEMA(data, p) {
  if (data.length < p) return null;
  const k = 2/(p+1);
  let e = data.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for (let i=p; i<data.length; i++) e = data[i]*k + e*(1-k);
  return e;
}

function calcATR(H, L, C, p=14) {
  const tr = [H[0]-L[0]];
  for (let i=1; i<C.length; i++)
    tr.push(Math.max(H[i]-L[i], Math.abs(H[i]-C[i-1]), Math.abs(L[i]-C[i-1])));
  let atr = tr.slice(0,p).reduce((a,b)=>a+b,0)/p;
  for (let i=p; i<tr.length; i++) atr = (atr*(p-1)+tr[i])/p;
  return atr;
}

function calcAllEMAs(C, H, L, V) {
  const atr = calcATR(H, L, C);
  const price = C[C.length-1];
  const prevPrice = C[C.length-2];
  const emas = [];

  FIB.forEach((p, i) => {
    if (C.length < p) return;
    const emaVal = calcEMA(C, p);
    if (!emaVal) return;

    // فاصله نرمال‌شده از قیمت
    const dist = emaVal - price;
    const distNorm = dist / atr;

    // نیروی گرانش: F = G / r²
    // هرچه فاصله کمتر → نیرو بیشتر، هرچه دوره بلندتر → جرم بیشتر
    const r = Math.abs(distNorm) || 0.001;
    const mass = Math.log(p+1); // جرم = لگاریتم دوره
    const gravity = (mass / (r * r)) * Math.sign(dist);
    // نیروی واقعی با حجم OANDA
    const recentVol = V ? V.slice(-5).reduce((a,b)=>a+b,0)/5 : 1;
    const avgVol = V ? V.reduce((a,b)=>a+b,0)/V.length : 1;
    const volRatio = recentVol / avgVol; // نسبت حجم اخیر به میانگین

    // آیا قیمت این EMA را شکسته؟
    const prevEMA = calcEMA(C.slice(0,-1), p);
    let broken = null;
    if (prevEMA) {
      if (prevPrice < prevEMA && price > emaVal) broken = 'up';
      else if (prevPrice > prevEMA && price < emaVal) broken = 'dn';
    }

    emas.push({
      period: p,
      value: emaVal,
      dist,
      distNorm,
      gravity,
      color: FIB_COLORS[i],
      broken,
      above: price > emaVal
    });
  });

  return { emas, atr, price, prevPrice };
}

function analyzeGravity(emas, price, atr, sym) {
  if (!emas.length) return null;

  // نیروی کل گرانش
  const totalGravity = emas.reduce((sum, e) => sum + e.gravity, 0);
  const normGravity = totalGravity / emas.length;

  // EMAهای شکسته شده
  const brokenUp = emas.filter(e => e.broken === 'up');
  const brokenDn = emas.filter(e => e.broken === 'dn');

  // تعداد EMAهای بالا و پایین قیمت
  const aboveCount = emas.filter(e => e.above).length;
  const belowCount = emas.length - aboveCount;

  // هدف بعدی — نزدیک‌ترین EMA در جهت حرکت
  const movingUp = normGravity < 0; // گرانش به پایین = EMAها بالای قیمت = جذب به بالا
  const targets = emas
    .filter(e => movingUp ? e.dist > 0 : e.dist < 0)
    .sort((a,b) => Math.abs(a.dist) - Math.abs(b.dist));
  const nextTarget = targets[0] || null;
  const target2 = targets[1] || null;

  // وضعیت
  let state, stateColor, direction;
  const d = sym.includes('JPY')||sym.includes('XAU')||sym.includes('WTI')||sym.includes('BTC') ? 2 : 5;

  if (Math.abs(normGravity) < 0.5) {
    state = '— تعادل';
    stateColor = '#8b949e';
    direction = 'neu';
  } else if (normGravity < 0) {
    // EMAها بالای قیمت → جذب به بالا
    if (brokenUp.length > 0) {
      state = '▲ جذب صعودی قوی';
      stateColor = '#3fb950';
    } else {
      state = '▲ جذب صعودی';
      stateColor = '#69db7c';
    }
    direction = 'up';
  } else {
    // EMAها زیر قیمت → جذب به پایین
    if (brokenDn.length > 0) {
      state = '▼ جذب نزولی قوی';
      stateColor = '#f85149';
    } else {
      state = '▼ جذب نزولی';
      stateColor = '#f08080';
    }
    direction = 'dn';
  }

  // توضیح متنی
  let narrative = '';
  const priceStr = price.toFixed(d);

  if (direction === 'up') {
    narrative = `قیمت ${priceStr} در حال حرکت به سمت بالاست. `;
    if (brokenUp.length > 0)
      narrative += `EMA${brokenUp.map(e=>e.period).join('، ')} شکسته شده — شتاب صعودی تایید شده. `;
    if (nextTarget)
      narrative += `نزدیک‌ترین هدف جذب: EMA${nextTarget.period} در ${nextTarget.value.toFixed(d)} (فاصله ${Math.abs(nextTarget.distNorm).toFixed(1)}× ATR). `;
    if (target2)
      narrative += `هدف بعدی: EMA${target2.period} در ${target2.value.toFixed(d)}. `;
    narrative += `این حرکت ادامه دارد مگر اینکه قیمت به EMA${nextTarget?.period||'بزرگ'} برسد و دفع شود.`;
  } else if (direction === 'dn') {
    narrative = `قیمت ${priceStr} در حال حرکت به سمت پایین است. `;
    if (brokenDn.length > 0)
      narrative += `EMA${brokenDn.map(e=>e.period).join('، ')} شکسته شده — شتاب نزولی تایید شده. `;
    if (nextTarget)
      narrative += `نزدیک‌ترین هدف جذب: EMA${nextTarget.period} در ${nextTarget.value.toFixed(d)} (فاصله ${Math.abs(nextTarget.distNorm).toFixed(1)}× ATR). `;
    if (target2)
      narrative += `هدف بعدی: EMA${target2.period} در ${target2.value.toFixed(d)}. `;
    narrative += `این حرکت ادامه دارد مگر اینکه قیمت به EMA${nextTarget?.period||'بزرگ'} برسد و دفع شود.`;
  } else {
    narrative = `قیمت ${priceStr} در حالت تعادل است. نیروهای جذب از بالا و پایین یکدیگر را خنثی می‌کنند. منتظر شکست یک EMA کلیدی باشید.`;
  }

  return {
    state, stateColor, direction, normGravity, totalGravity,
    aboveCount, belowCount, brokenUp, brokenDn,
    nextTarget, target2, narrative, atr, price, d
  };
}

function fmt(v, sym) {
  if (!v && v!==0) return '—';
  if (sym.includes('JPY')||sym.includes('XAU')||sym.includes('WTI')||sym.includes('BTC')) return parseFloat(v).toFixed(2);
  return parseFloat(v).toFixed(5);
}

function renderUI(emas, analysis, sym, last, chg, chgSign) {
  if (!analysis) { document.getElementById('content').innerHTML = '<div class="error">داده کافی نیست</div>'; return; }

  const d = analysis.d;
  const sigClass = analysis.direction==='up'?'ms-buy':analysis.direction==='dn'?'ms-sell':'ms-neu';
  const chgColor = parseFloat(chg)>=0?'up':'dn';

  // نیروی گرانش کل — نرمال از -5 تا +5
  const gNorm = Math.max(-5, Math.min(5, analysis.normGravity));
  // مثبت = EMAها زیر قیمت = جذب به پایین
  // منفی = EMAها بالای قیمت = جذب به بالا
  const gPct = ((gNorm + 5) / 10 * 100);
  const gColor = gNorm < -0.5 ? '#3fb950' : gNorm > 0.5 ? '#f85149' : '#8b949e';
  const gLabel = gNorm < -0.5 ? '▲ جذب به بالا' : gNorm > 0.5 ? '▼ جذب به پایین' : '— متعادل';

  let html = '';

  // ── سیگنال اصلی ──
  html += `<div class="main-sig ${sigClass}">
    <div class="ms-title" style="color:${analysis.stateColor}">${analysis.state}</div>
    <div class="ms-body">${analysis.narrative}</div>
    ${analysis.nextTarget ? `<div class="ms-target" style="color:${analysis.stateColor}">هدف: EMA${analysis.nextTarget.period} = ${analysis.nextTarget.value.toFixed(d)} | فاصله: ${Math.abs(analysis.nextTarget.distNorm).toFixed(2)}× ATR</div>` : ''}
  </div>`;

  // ── کارت‌های وضعیت ──
  html += `<div class="state-grid">
    <div class="state-card">
      <div class="sc-title">قیمت فعلی</div>
      <div class="sc-val">${fmt(last,sym)}</div>
      <div class="sc-sub ${chgColor}">${chgSign}${chg}%</div>
    </div>
    <div class="state-card">
      <div class="sc-title">ATR</div>
      <div class="sc-val nu">${analysis.atr.toFixed(d)}</div>
      <div class="sc-sub">نوسان میانگین</div>
    </div>
    <div class="state-card">
      <div class="sc-title">EMA بالای قیمت</div>
      <div class="sc-val up">${analysis.aboveCount}</div>
      <div class="sc-sub">جاذبه به بالا</div>
    </div>
    <div class="state-card">
      <div class="sc-title">EMA زیر قیمت</div>
      <div class="sc-val dn">${analysis.belowCount}</div>
      <div class="sc-sub">جاذبه به پایین</div>
    </div>
  </div>`;

  // ── گیج گرانش ──
  html += `<div class="gravity-box">
    <div class="gravity-hdr">
      <span>🌌 نیروی گرانش EMA</span>
      <span style="color:${gColor}">${gLabel}</span>
    </div>
    <div class="gravity-body">
      <div class="gravity-total">
        <span class="gt-label">گرانش کل:</span>
        <div class="gt-bar-bg">
          <div class="gt-center"></div>
          <div class="gt-bar-fill" style="width:${Math.abs(gPct-50)}%;margin-right:${gPct>50?'50%':'auto'};margin-left:${gPct<50?50-gPct+'%':'0'};background:${gColor}"></div>
        </div>
        <span class="gt-val" style="color:${gColor}">${gNorm.toFixed(2)}</span>
      </div>
      <div class="ema-list">`;

  // هر EMA یک ردیف
  emas.forEach(e => {
    const distPct = Math.max(-5, Math.min(5, e.distNorm));
    const barPct = Math.abs(distPct) / 5 * 50;
    const isAbove = e.dist > 0;
    const barColor = e.broken ? (e.broken==='up'?'#f0b429':'#f0b429') : (isAbove ? '#3fb950' : '#f85149');
    const distStr = (e.distNorm > 0 ? '+' : '') + e.distNorm.toFixed(1) + '×';
    html += `<div class="ema-row">
      <span class="ema-label" style="color:${e.color}">EMA${e.period}</span>
      <div class="ema-bar-bg">
        <div class="ema-center"></div>
        <div class="ema-bar-fill" style="width:${barPct}%;${isAbove?'margin-right:50%':'margin-left:'+(50-barPct)+'%'};background:${barColor}${e.broken?';box-shadow:0 0 4px '+barColor:''}"></div>
      </div>
      <span class="ema-dist" style="color:${barColor}">${distStr}</span>
      <span class="ema-price">${e.value.toFixed(e.period>=89?2:5)}</span>
    </div>`;
  });

  html += `</div></div></div>`;

  // ── EMAهای شکسته شده ──
  const allBroken = [...analysis.brokenUp, ...analysis.brokenDn];
  if (allBroken.length > 0) {
    html += `<div class="broken-box">
      <div class="broken-hdr">⚡ EMAهای شکسته شده (آخرین شمع)</div>
      <div class="broken-list">`;
    allBroken.forEach(e => {
      const isUp = e.broken === 'up';
      html += `<div class="broken-item ${isUp?'bi-up':'bi-dn'}">
        <span class="bi-label">${isUp?'▲ شکست صعودی':'▼ شکست نزولی'} EMA${e.period}</span>
        <span class="bi-detail">قیمت EMA: ${e.value.toFixed(d)} | فاصله: ${Math.abs(e.distNorm).toFixed(2)}× ATR</span>
      </div>`;
    });
    html += `</div></div>`;
  } else {
    html += `<div class="broken-box"><div class="broken-hdr">⚡ EMAهای شکسته شده</div><div style="padding:10px 12px;font-size:12px;color:#8b949e">در آخرین شمع شکستی رخ نداده</div></div>`;
  }

  document.getElementById('content').innerHTML = html;
}

async function loadData() {
  const sym = document.getElementById('sym').value;
  const tf = document.getElementById('tf').value;
  const btn = document.getElementById('btn');
  btn.textContent = 'در حال تحلیل...'; btn.disabled = true;
  document.getElementById('content').innerHTML = '<div class="status">در حال دریافت داده...</div>';

  try {
    // اول OANDA را امتحان کن، اگر نشد Twelve Data
    let C, H, L, V, last;
    try {
      const oanda = await fetchOandaCandles(sym, tf, 500);
      C = oanda.C; H = oanda.H; L = oanda.L; V = oanda.V; last = oanda.last;
      document.getElementById('ut').textContent = '✅ OANDA — ' + new Date().toLocaleTimeString('fa-IR');
    } catch(oandaErr) {
      // fallback به Twelve Data
      const res = await fetch(`https://api.twelvedata.com/time_series?symbol=${sym}&interval=${tf}&outputsize=500&apikey=${KEY}`);
      const json = await res.json();
      if (json.status === 'error' || !json.values) throw new Error(json.message || 'داده دریافت نشد');
      const vals = json.values.reverse();
      C = vals.map(v => parseFloat(v.close));
      H = vals.map(v => parseFloat(v.high));
      L = vals.map(v => parseFloat(v.low));
      V = null;
      last = C[C.length-1];
      document.getElementById('ut').textContent = '⚠️ TwelveData — ' + new Date().toLocaleTimeString('fa-IR');
    }

    const prev = C[C.length-2];
    const chg = ((last-prev)/prev*100).toFixed(3);
    const chgSign = parseFloat(chg) >= 0 ? '+' : '';

    const { emas, atr, price } = calcAllEMAs(C, H, L, V);
    const analysis = analyzeGravity(emas, price, atr, sym);

    renderUI(emas, analysis, sym, last, chg, chgSign);
    document.getElementById('ut').textContent = sym + ' — ' + new Date().toLocaleTimeString('fa-IR');

  } catch(e) {
    document.getElementById('content').innerHTML = '<div class="error">خطا: ' + e.message + '</div>';
  }

  btn.textContent = 'تحلیل کن'; btn.disabled = false;

}
</script>
</body>
</html>
